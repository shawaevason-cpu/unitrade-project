<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Saved Items - UniTrade</title>
<link rel="stylesheet" href="../css/ut.css">
<style>
:root{--primary:#007bff;--primary-hover:#0056b3;--primary-dim:rgba(0,123,255,.08);--secondary:#28a745;--danger:#dc2626;--bg-page:#f4f6f9;--bg-card:#fff;--bg-tertiary:#f8f9fa;--border:#e2e8f0;--text-primary:#1a1a2e;--text-secondary:#555770;--text-muted:#9ca3af;--radius:8px;--radius-lg:12px;--radius-xl:18px;--font-display:'Cormorant Garamond',Georgia,serif;--font-body:'Syne',system-ui,sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg-page);color:var(--text-primary);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh;}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.1);top:0;z-index:1000;gap:16px;}
.logo{font-size:22px;font-weight:700;color:#007bff;text-decoration:none;flex-shrink:0;}.logo span{color:#333;}
.nav-links{display:flex;gap:4px;align-items:center;}
.nav-link{padding:7px 10px;border-radius:var(--radius);text-decoration:none;color:#555;font-size:.8rem;font-weight:500;transition:background .2s,color .2s;display:flex;align-items:center;gap:4px;}
.nav-link:hover{background:#f0f0f0;color:#007bff;}
.nav-link.nav-active{color:#007bff;font-weight:700;background:rgba(0,123,255,.06);}
.nav-notif{position:relative;}
.nav-badge{position:absolute;top:-5px;right:-5px;background:var(--danger);color:#fff;border-radius:50%;min-width:16px;height:16px;font-size:.6rem;font-weight:800;display:none;align-items:center;justify-content:center;border:2px solid #fff;padding:0 2px;}
.nav-av{width:34px;height:34px;border-radius:50%;background:var(--primary-dim);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;text-decoration:none;transition:box-shadow .2s,transform .15s;border:2px solid transparent;overflow:hidden;flex-shrink:0;}
.nav-av:hover{transform:scale(1.08);box-shadow:0 0 0 3px rgba(0,123,255,.2);}
.nav-av.nav-av-on{border-color:var(--primary);}
.nav-av img{width:100%;height:100%;object-fit:cover;}
#toastWrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:9999;pointer-events:none;}
.toast{color:#fff;padding:12px 18px;border-radius:10px;font-size:.82rem;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:sIn .3s ease;max-width:280px;}
.toast.success{background:#166534;}.toast.error{background:var(--danger);}.toast.info{background:var(--primary);}
@keyframes sIn{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}
.main{max-width:1280px;margin:0 auto;padding:40px 20px;}
.page-hdr{margin-bottom:24px;}
.page-title{font-family:var(--font-display);font-size:2rem;font-weight:600;margin-bottom:4px;}
.page-sub{font-size:.875rem;color:var(--text-secondary);}
.listings-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px; align-items: stretch;}
.listing-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;display:flex;flex-direction:column;transition:transform .22s,box-shadow .22s,border-color .22s;cursor:pointer;/* animation removed */}
.listing-card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(0,0,0,.13);border-color:#c8d9f0;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.card-image{width:100%;height:275px;overflow:hidden;background:var(--bg-tertiary);position:relative;}
.card-image img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.listing-card:hover .card-image img{transform:scale(1.04);}
.card-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--text-muted);font-size:.72rem;text-transform:uppercase;}
.condition-pill{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);padding:8px 12px;border-radius:999px;font-size:.78rem;font-weight:700;color:var(--text-primary);box-shadow:0 10px 26px rgba(0,0,0,.12);}
.card-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:12px;}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.card-title{font-size:1rem;font-weight:700;line-height:1.3;color:var(--text-primary);}
.card-price{font-family:var(--font-display);font-size:1.2rem;font-weight:700;color:var(--primary);white-space:nowrap;}
.card-meta{display:flex;align-items:center;justify-content:space-between;font-size:.82rem;color:var(--text-muted);padding-top:10px;border-top:1px solid var(--border);}
.card-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-start;margin-top:12px;}
.card-actions button{flex:1 1 auto;min-width:120px;}
.card-btn{padding:8px 6px;border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;}
.card-btn-primary{background:var(--primary);color:#fff;width:100%;}.card-btn-primary:hover{background:var(--primary-hover);}
.card-btn-remove{background:var(--bg-tertiary);color:var(--danger);border:1px solid rgba(220,38,38,.2);width:100%;}.card-btn-remove:hover{background:#fef2f2;}
.guest-notice{background:#fffbeb;border:1px solid #fcd34d;border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:24px;font-size:.82rem;color:#92400e;display:none;}
.guest-notice a{color:var(--primary);font-weight:700;}
.empty-state{text-align:center;padding:80px 20px;}
.empty-icon{width:80px;height:80px;border-radius:50%;background:#fef2f2;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.empty-state h3{font-family:var(--font-display);font-size:1.75rem;font-weight:600;margin-bottom:8px;}
.empty-state p{color:var(--text-secondary);font-size:.875rem;margin-bottom:24px;}
.btn-browse{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;background:var(--primary);color:#fff;border-radius:var(--radius-lg);text-decoration:none;font-weight:700;font-size:.85rem;box-shadow:0 2px 8px rgba(0,123,255,.25);}
.btn-browse:hover{background:var(--primary-hover);}
.skeleton{background:linear-gradient(90deg,#f0f2f5 25%,#e8eaed 50%,#f0f2f5 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px;}
@keyframes shimmer{from{background-position:200% 0;}to{background-position:-200% 0;}}
@media(max-width:1024px){.listings-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:768px){.listings-grid{grid-template-columns:repeat(2,1fr);gap:12px;}}
@media(max-width:480px){.listings-grid{grid-template-columns:1fr;}}
</style>
<script src="../js/config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/navbar.js"></script>
</head>
<body>
  <script>document.addEventListener('DOMContentLoaded',()=>renderNavbar('saved',{showLogin:false}));</script>

<main class="main-wrap">
  <div class="page-hdr">
    <h1 class="page-title">Saved Items</h1>
    <p class="page-sub" id="savedSub">Items you've bookmarked</p>
  </div>
  <div id="guestNotice" class="guest-notice">⚠️ <a href="login.html">Sign in</a> to see your saved items.</div>
  <div id="savedContainer">
    <div class="listings-grid"><div style="background:#fff;border:1px solid #e2e8f0;border-radius:18px;overflow:hidden;"><div class="skeleton" style="height:200px;border-radius:0;"></div><div style="padding:14px;display:flex;flex-direction:column;gap:10px;"><div class="skeleton" style="height:14px;width:70%;"></div><div class="skeleton" style="height:22px;width:45%;"></div></div></div><div style="background:#fff;border:1px solid #e2e8f0;border-radius:18px;overflow:hidden;"><div class="skeleton" style="height:200px;border-radius:0;"></div><div style="padding:14px;display:flex;flex-direction:column;gap:10px;"><div class="skeleton" style="height:14px;width:70%;"></div><div class="skeleton" style="height:22px;width:45%;"></div></div></div><div style="background:#fff;border:1px solid #e2e8f0;border-radius:18px;overflow:hidden;"><div class="skeleton" style="height:200px;border-radius:0;"></div><div style="padding:14px;display:flex;flex-direction:column;gap:10px;"><div class="skeleton" style="height:14px;width:70%;"></div><div class="skeleton" style="height:22px;width:45%;"></div></div></div><div style="background:#fff;border:1px solid #e2e8f0;border-radius:18px;overflow:hidden;"><div class="skeleton" style="height:200px;border-radius:0;"></div><div style="padding:14px;display:flex;flex-direction:column;gap:10px;"><div class="skeleton" style="height:14px;width:70%;"></div><div class="skeleton" style="height:22px;width:45%;"></div></div></div></div>
  </div>
</main>
<div id="toastWrap"></div>

<script>
function getToken(){return localStorage.getItem('token')||'';}
function authH(){return{'Content-Type':'application/json','Authorization':'Bearer '+getToken()};}
function showToast(msg,t='info'){const w=document.getElementById('toastWrap');const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;w.appendChild(el);setTimeout(()=>el.remove(),3200);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ago(iso){if(!iso)return'';const m=Math.floor((Date.now()-new Date(iso))/60000);if(m<1)return'just now';if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';}

function buildCard(l,i){
  const img=l.images?.length?`<img src="${l.images[0]}" alt="${esc(l.title)}" loading="lazy">`:`<div class="card-img-ph"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#c8d1dc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
  const cc='cond-'+(l.condition||'good');
  const condMap={new:'New',like_new:'Like New',good:'Good',fair:'Fair',poor:'Poor'};
  return`<div class="listing-card" role="button" tabindex="0" onclick="window.location.href='listing.html?id=${l.id}'" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();window.location.href='listing.html?id=${l.id}';}">
    <div class="card-image">
      ${img}
      <div class="condition-pill ${cc}">${condMap[l.condition]||'Good'}</div>
    </div>
    <div class="card-body">
      <div class="card-header">
        <div class="card-title">${esc(l.title)}</div>
        <div class="card-price">MK ${Number(l.price).toLocaleString()}</div>
      </div>
      <div class="card-meta"><span>${esc(l.sellerName||'Seller')}</span><span>${ago(l.createdAt)}</span></div>
      <div class="card-actions">
        <button class="card-btn card-btn-remove" type="button" onclick="event.stopPropagation();unsave(${l.id},this)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          Remove
        </button>
      </div>
    </div>
  </div>`;
}

async function unsave(id,btn){
  try{
    const res=await fetch(API+'/listings/'+id+'/save',{method:'POST',headers:authH()});
    const data=await res.json();
    if(!data.saved){btn.closest('.listing-card').remove();showToast('Removed from saved','info');checkEmpty();}
  }catch{showToast('Could not remove — server running?','error');}
}
function checkEmpty(){if(!document.querySelector('.listing-card'))renderEmpty();}
function renderEmpty(){
  document.getElementById('savedContainer').innerHTML=`<div class="empty-state"><div class="empty-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div><h3>No saved items</h3><p>Browse listings and tap Save to bookmark items you like.</p><a href="browse.html" class="btn-browse">Browse Listings →</a></div>`;
}

async function loadSaved(){
  if(!getToken()){document.getElementById('guestNotice').style.display='block';renderEmpty();return;}
  try{
    const res=await fetch(API+'/user/saved',{headers:authH()});
    const list=res.ok?await res.json():[];
    document.getElementById('savedSub').textContent=list.length===0?'No saved items yet':list.length+' saved item'+(list.length!==1?'s':'');
    if(list.length===0){renderEmpty();return;}
    document.getElementById('savedContainer').innerHTML=`<div class="listings-grid">${list.map((l,i)=>buildCard(l,i)).join('')}</div>`;
  }catch{
    document.getElementById('savedContainer').innerHTML='<p style="color:var(--text-muted);padding:40px 0;text-align:center;">Could not load — is the server running?</p>';
  }
}
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",loadSaved,{once:true});}else{loadSaved();}
</script>
</body></html>
